<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Entregas{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-base:       #0d0f14;
            --bg-surface:    #141720;
            --bg-elevated:   #1c2030;
            --bg-hover:      #242840;
            --border:        #2a2f45;
            --border-bright: #3a4060;

            --text-primary:  #e8eaf2;
            --text-secondary:#8b91b0;
            --text-muted:    #545a78;

            --accent-blue:   #4d7cff;
            --accent-blue-hover: #3a6aee;
            --accent-blue-glow:  rgba(77,124,255,0.18);
            --accent-emerald:#2dd4a7;
            --accent-emerald-glow: rgba(45,212,167,0.15);
            --accent-rose:   #ff5e7e;
            --accent-amber:  #f5a623;

            --success:       #2dd4a7;
            --danger:        #ff5e7e;
            --info:          #4d7cff;
            --warning:       #f5a623;

            --radius-sm:     6px;
            --radius-md:     10px;
            --radius-lg:     16px;
            --shadow-sm:     0 1px 4px rgba(0,0,0,0.4);
            --shadow-md:     0 4px 16px rgba(0,0,0,0.5);
            --shadow-lg:     0 8px 32px rgba(0,0,0,0.6);

            --transition:    all 0.2s cubic-bezier(0.4,0,0.2,1);
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'DM Sans', sans-serif;
            background-color: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            /* Subtle noise texture */
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -10%, rgba(77,124,255,0.08) 0%, transparent 70%);
        }

        /* ── HEADER ── */
        header {
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            height: 64px;
            display: flex;
            align-items: center;
            gap: 14px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
            box-shadow: 0 1px 0 var(--border), var(--shadow-sm);
        }

        .header-logo {
            width: 34px;
            height: 34px;
            background: linear-gradient(135deg, var(--accent-blue) 0%, var(--accent-emerald) 100%);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 0 12px var(--accent-blue-glow);
        }

        .header-logo svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: white;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        header h1 {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        .header-badge {
            margin-left: 4px;
            font-size: 11px;
            font-weight: 500;
            color: var(--accent-emerald);
            background: var(--accent-emerald-glow);
            border: 1px solid rgba(45,212,167,0.25);
            border-radius: 20px;
            padding: 2px 8px;
            letter-spacing: 0.02em;
        }

        /* ── NAV ── */
        nav {
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            display: flex;
            gap: 2px;
            overflow-x: auto;
        }

        nav::-webkit-scrollbar { display: none; }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0 14px;
            height: 44px;
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 13.5px;
            font-weight: 500;
            white-space: nowrap;
            border-bottom: 2px solid transparent;
            transition: var(--transition);
            position: relative;
        }

        nav a svg {
            width: 15px;
            height: 15px;
            opacity: 0.7;
            transition: var(--transition);
        }

        nav a:hover {
            color: var(--text-primary);
            border-bottom-color: var(--border-bright);
        }

        nav a:hover svg { opacity: 1; }

        nav a.active {
            color: var(--accent-blue);
            border-bottom-color: var(--accent-blue);
        }

        nav a.active svg { opacity: 1; }

        /* ── CONTAINER ── */
        .container {
            max-width: 1440px;
            margin: 0 auto;
            padding: 32px 32px 48px;
            flex: 1;
        }

        /* ── PAGE TITLES ── */
        h1 {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.02em;
            margin-bottom: 24px;
        }

        h2 {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            margin-bottom: 14px;
            margin-top: 36px;
        }

        h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* ── SEARCH / FILTER BAR ── */
        .filtro-container {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .filtro-container label {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .search-wrap {
            position: relative;
            flex: 1;
            max-width: 380px;
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        .filtro-container input,
        .search-input {
            width: 100%;
            padding: 8px 12px 8px 36px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: 'DM Sans', sans-serif;
            font-size: 13.5px;
            transition: var(--transition);
        }

        .filtro-container input:focus,
        .search-input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px var(--accent-blue-glow);
        }

        .filtro-container input::placeholder,
        .search-input::placeholder {
            color: var(--text-muted);
        }

        /* ── TABLE ── */
        .table-wrap {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-md);
            margin-bottom: 32px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            background: transparent;
            box-shadow: none;
            margin-bottom: 0;
        }

        thead {
            background: var(--bg-elevated);
            border-bottom: 1px solid var(--border);
        }

        th {
            background: transparent;
            color: var(--text-muted);
            padding: 11px 16px;
            text-align: left;
            border: none;
            font-size: 11.5px;
            font-weight: 600;
            letter-spacing: 0.07em;
            text-transform: uppercase;
            white-space: nowrap;
        }

        td {
            padding: 12px 16px;
            border: none;
            border-bottom: 1px solid var(--border);
            font-size: 13.5px;
            color: var(--text-primary);
            vertical-align: middle;
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        tbody tr {
            transition: background 0.15s ease;
        }

        tbody tr:hover {
            background: var(--bg-hover);
        }

        tbody tr:nth-child(even) {
            background: rgba(255,255,255,0.015);
        }

        tbody tr:nth-child(even):hover {
            background: var(--bg-hover);
        }

        .total-row {
            background: rgba(77,124,255,0.05) !important;
        }

        .total-row td {
            font-weight: 500;
            color: var(--text-primary);
        }

        /* ── BADGES ── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .badge-success {
            color: var(--success);
            background: rgba(45,212,167,0.1);
            border: 1px solid rgba(45,212,167,0.2);
        }

        .badge-danger {
            color: var(--danger);
            background: rgba(255,94,126,0.1);
            border: 1px solid rgba(255,94,126,0.2);
        }

        /* ── BUTTONS ── */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            border: 1px solid transparent;
            white-space: nowrap;
        }

        .btn svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        .btn-primary {
            background: var(--accent-blue);
            color: white;
            border-color: var(--accent-blue);
            box-shadow: 0 0 12px rgba(77,124,255,0.25);
        }

        .btn-primary:hover {
            background: var(--accent-blue-hover);
            border-color: var(--accent-blue-hover);
            box-shadow: 0 0 18px rgba(77,124,255,0.35);
            transform: translateY(-1px);
        }

        .btn-success {
            background: rgba(45,212,167,0.12);
            color: var(--success);
            border-color: rgba(45,212,167,0.25);
        }

        .btn-success:hover {
            background: rgba(45,212,167,0.2);
            border-color: rgba(45,212,167,0.4);
            transform: translateY(-1px);
        }

        .btn-info {
            background: rgba(77,124,255,0.1);
            color: var(--accent-blue);
            border-color: rgba(77,124,255,0.22);
        }

        .btn-info:hover {
            background: rgba(77,124,255,0.18);
            border-color: rgba(77,124,255,0.4);
            transform: translateY(-1px);
        }

        .btn-ghost {
            background: transparent;
            color: var(--text-secondary);
            border-color: var(--border);
        }

        .btn-ghost:hover {
            background: var(--bg-elevated);
            color: var(--text-primary);
            border-color: var(--border-bright);
        }

        .btn-sm {
            padding: 5px 11px;
            font-size: 12px;
        }

        .btn-sm svg {
            width: 12px;
            height: 12px;
        }

        /* ── AGREGAR FORM ── */
        .agregar-form {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        .agregar-form input {
            width: 90px;
            padding: 5px 9px;
            background: var(--bg-elevated);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary);
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            transition: var(--transition);
        }

        .agregar-form input:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 2px var(--accent-blue-glow);
        }

        .agregar-form input::placeholder {
            color: var(--text-muted);
        }

        .agregar-form button {
            padding: 5px 11px;
            background: rgba(77,124,255,0.12);
            color: var(--accent-blue);
            border: 1px solid rgba(77,124,255,0.22);
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            font-family: 'DM Sans', sans-serif;
            transition: var(--transition);
            white-space: nowrap;
        }

        .agregar-form button:hover {
            background: rgba(77,124,255,0.2);
            border-color: rgba(77,124,255,0.4);
        }

        /* ── TEXT MUTED / MONO ── */
        .text-muted {
            color: var(--text-muted);
            font-style: italic;
            font-size: 12.5px;
        }

        .mono {
            font-family: 'DM Mono', monospace;
            font-size: 12.5px;
            color: var(--text-secondary);
        }

        .amount {
            font-family: 'DM Mono', monospace;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
        }

        /* ── SIN RESULTADOS ── */
        .sin-resultados {
            text-align: center;
            padding: 48px 20px;
            color: var(--text-muted);
            font-size: 14px;
        }

        .sin-resultados-wrap {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 48px 20px;
            text-align: center;
        }

        .sin-resultados-icon {
            width: 44px;
            height: 44px;
            margin: 0 auto 14px;
            color: var(--text-muted);
            opacity: 0.5;
        }

        /* ── CARD ── */
        .card {
            background: var(--bg-surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: var(--shadow-sm);
        }

        /* ── FOOTER ── */
        footer {
            background: var(--bg-surface);
            border-top: 1px solid var(--border);
            padding: 18px 32px;
            text-align: center;
            color: var(--text-muted);
            font-size: 12.5px;
        }

        footer span {
            color: var(--accent-blue);
            font-weight: 500;
        }

        /* ── UTILITY ── */
        .flex { display: flex; }
        .gap-2 { gap: 8px; }
        .gap-3 { gap: 12px; }
        .gap-4 { gap: 16px; }
        .items-center { align-items: center; }
        .flex-wrap { flex-wrap: wrap; }
        .mt-2 { margin-top: 8px; }
        .mt-4 { margin-top: 16px; }
        .mb-4 { margin-bottom: 16px; }

        /* ── SCROLLBAR ── */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-base); }
        ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* ── ANIMATIONS ── */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        @keyframes slideInUp {
            from { transform: translateY(100%); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        @keyframes slideOutDown {
            from { transform: translateY(0);    opacity: 1; }
            to   { transform: translateY(100%); opacity: 0; }
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.5; }
        }

        .container > * {
            animation: fadeInUp 0.35s ease both;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .container { padding: 20px 16px 40px; }
            header, nav { padding-left: 16px; padding-right: 16px; }
            footer { padding: 16px; }
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header>
        <div class="header-logo">
            <svg viewBox="0 0 24 24">
                <path d="M20 7H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2Z"/>
                <path d="M16 3H8L6 7h12l-2-4ZM12 11v4M8 13h8"/>
            </svg>
        </div>
        <h1>Sistema de Entregas</h1>
        <span class="header-badge">v2.0</span>
    </header>

    <nav>
        <a href="/">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
            </svg>
            Inicio
        </a>
        <a href="/tiendas">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
            </svg>
            Tiendas
        </a>
        <a href="/entregas_por_fecha">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
                <line x1="3" y1="10" x2="21" y2="10"/>
            </svg>
            Por Fecha
        </a>
        <a href="/filtro_vendedor">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/>
            </svg>
            Vendedores
        </a>

        <a href="/vendedores">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/>
            </svg>
            Resumen Vendedores
        </a>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer>
        <p>&copy; 2026 <span>Sistema de Entregas</span> — Todas las tiendas</p>
    </footer>

    <script>
        // Highlight active nav link
        (function() {
            const links = document.querySelectorAll('nav a');
            const path  = window.location.pathname;
            links.forEach(link => {
                const href = link.getAttribute('href');
                if (href === path || (path !== '/' && href !== '/' && path.startsWith(href))) {
                    link.classList.add('active');
                }
            });
        })();

        function filtrarTabla(idTabla, idFiltro) {
            const filtro = document.getElementById(idFiltro).value.toLowerCase();
            const tabla  = document.getElementById(idTabla);
            const filas  = tabla.getElementsByTagName('tbody')[0].getElementsByTagName('tr');
            let visible  = 0;

            for (let i = 0; i < filas.length; i++) {
                const fila  = filas[i];
                const texto = fila.textContent.toLowerCase();
                fila.style.display = texto.includes(filtro) ? '' : 'none';
                if (texto.includes(filtro)) visible++;
            }

            let msg = tabla.nextElementSibling;
            if (msg && msg.classList.contains('sin-resultados')) tabla.parentElement.removeChild(msg);

            if (visible === 0) {
                const div = document.createElement('div');
                div.className = 'sin-resultados';
                div.textContent = 'No hay resultados que coincidan con la búsqueda';
                tabla.parentElement.appendChild(div);
            }
        }

        function mostrarModalConfirmacion(titulo, mensaje, onConfirm) {
            const modal = document.createElement('div');
            Object.assign(modal.style, {
                position: 'fixed', inset: '0',
                background: 'rgba(0,0,0,0.75)',
                display: 'flex', justifyContent: 'center', alignItems: 'center',
                zIndex: '2000', backdropFilter: 'blur(6px)'
            });

            modal.innerHTML = `
                <div style="
                    background: #1c2030;
                    border: 1px solid #2a2f45;
                    border-radius: 16px;
                    padding: 32px;
                    max-width: 420px;
                    width: 90%;
                    box-shadow: 0 24px 64px rgba(0,0,0,0.7);
                    animation: slideUp 0.25s ease-out;
                ">
                    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;">
                        <div style="
                            width:38px;height:38px;border-radius:10px;
                            background:rgba(245,166,35,0.12);border:1px solid rgba(245,166,35,0.25);
                            display:flex;align-items:center;justify-content:center;flex-shrink:0;
                        ">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#f5a623" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                                <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
                            </svg>
                        </div>
                        <h2 style="font-size:17px;font-weight:600;color:#e8eaf2;margin:0;">${titulo}</h2>
                    </div>
                    <p style="color:#8b91b0;font-size:13.5px;line-height:1.6;margin-bottom:28px;">${mensaje}</p>
                    <div style="display:flex;gap:10px;justify-content:flex-end;">
                        <button id="_modal_cancel" style="
                            padding:9px 20px;background:transparent;color:#e8eaf2;
                            border:1px solid #2a2f45;border-radius:8px;cursor:pointer;
                            font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;
                            transition:all 0.2s;
                        ">Cancelar</button>
                        <button id="_modal_confirm" style="
                            padding:9px 20px;background:#4d7cff;color:white;
                            border:1px solid #4d7cff;border-radius:8px;cursor:pointer;
                            font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;
                            transition:all 0.2s;box-shadow:0 0 12px rgba(77,124,255,0.3);
                        ">Confirmar</button>
                    </div>
                </div>`;

            document.body.appendChild(modal);

            modal.querySelector('#_modal_cancel').onclick  = () => modal.remove();
            modal.querySelector('#_modal_confirm').onclick = () => { modal.remove(); onConfirm(); };
            modal.onclick = e => { if (e.target === modal) modal.remove(); };

            // Hover effects
            const cancel  = modal.querySelector('#_modal_cancel');
            const confirm = modal.querySelector('#_modal_confirm');
            cancel.onmouseenter  = () => { cancel.style.background  = '#242840'; cancel.style.borderColor  = '#3a4060'; };
            cancel.onmouseleave  = () => { cancel.style.background  = 'transparent'; cancel.style.borderColor = '#2a2f45'; };
            confirm.onmouseenter = () => { confirm.style.background = '#3a6aee'; confirm.style.boxShadow   = '0 0 18px rgba(77,124,255,0.45)'; };
            confirm.onmouseleave = () => { confirm.style.background = '#4d7cff'; confirm.style.boxShadow   = '0 0 12px rgba(77,124,255,0.3)'; };
        }

        function mostrarSnackbar(mensaje, tipo = 'info') {
            const colors = { success: '#2dd4a7', error: '#ff5e7e', info: '#4d7cff', warning: '#f5a623' };
            const icons  = {
                success: '<path d="M20 6L9 17l-5-5"/>',
                error:   '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
                info:    '<circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>',
                warning: '<path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>'
            };
            const bg = colors[tipo] || colors.info;

            const sb = document.createElement('div');
            sb.style.cssText = `
                position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(0);
                background:#1c2030; border:1px solid ${bg}40;
                color:#e8eaf2; padding:13px 18px; border-radius:10px;
                box-shadow:0 8px 24px rgba(0,0,0,0.5), 0 0 0 1px ${bg}20;
                z-index:1500; font-size:13.5px; font-family:'DM Sans',sans-serif;
                animation:slideInUp 0.3s ease-out; max-width:400px; white-space:nowrap;
                display:flex; align-items:center; gap:10px;
            `;

            sb.innerHTML = `
                <div style="width:28px;height:28px;border-radius:6px;background:${bg}18;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${bg}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        ${icons[tipo] || icons.info}
                    </svg>
                </div>
                <span>${mensaje}</span>`;

            document.body.appendChild(sb);
            setTimeout(() => {
                sb.style.animation = 'slideOutDown 0.3s ease-in forwards';
                setTimeout(() => sb.remove(), 300);
            }, 3200);
        }
    </script>
</body>
